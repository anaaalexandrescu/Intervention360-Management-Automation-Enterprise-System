<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - INTERVENTION360</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #FDFBF7;
            --bg-nav: #FFFFFF;
            --accent: #B8A389;
            --text-dark: #2D2A26;
            --text-muted: #8C8379;
            --border: #E8E2D9;
            --shadow: 0 4px 20px rgba(184, 163, 137, 0.08);
            --card-bg: #FFFFFF;
        }

        body.dark-mode {
            --bg-main: #121212;
            --bg-nav: #1E1E1E;
            --card-bg: #1E1E1E;
            --text-dark: #E0E0E0;
            --text-muted: #a0a0a0;
            --border: #333333;
            --accent: #D4C3B0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-main);
            color: var(--text-dark);
        }

        .top-nav {
            height: 70px;
            background: var(--bg-nav);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo {
            font-weight: 900;
            color: var(--accent);
            font-size: 1.2rem;
        }

        .theme-toggle-btn {
            background: var(--accent);
            color: #121212;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .sidebar-menu {
            position: fixed;
            top: 70px;
            left: -300px;
            width: 300px;
            height: calc(100vh - 70px);
            background: var(--bg-nav);
            border-right: 1px solid var(--border);
            transition: 0.3s;
            z-index: 999;
        }

        .sidebar-menu.active {
            left: 0;
        }

        .menu-title {
            padding: 20px 20px 10px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
            color: var(--text-muted);
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            cursor: pointer;
            margin: 5px 15px;
        }

        .menu-item:hover, .menu-item.active {
            background: rgba(184, 163, 137, 0.1);
            color: var(--accent);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 16px;
            border-radius: 50px;
            background: var(--bg-main);
            border: 1px solid var(--border);
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: var(--accent);
            color: #121212;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
        }

        .btn-logout {
            background: #ff4757;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 35px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .error-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .error-title {
            color: #856404;
            margin-bottom: 10px;
            font-weight: 800;
            font-size: 0.9rem;
        }

        .error-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .error-item {
            color: #856404;
            padding: 5px 0;
            font-size: 0.85rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: var(--accent);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-main);
            color: var(--text-dark);
            font-family: inherit;
            outline: none;
        }

        .btn-save {
            background: var(--accent);
            color: #121212;
            padding: 14px 40px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            width: 100%;
        }

        .btn-save:hover {
            transform: translateY(-3px);
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sidebar-overlay {
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            height: calc(100vh - 70px);
            background: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 998;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .hamburger {
            width: 30px;
            height: 24px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hamburger span {
            display: block;
            width: 30px;
            height: 3px;
            background: var(--accent);
            border-radius: 3px;
        }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="nav-left">
        <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="logo">INTERVENTION360</div>
    </div>
    <div class="nav-right">
        <button class="theme-toggle-btn" id="themeBtn" onclick="toggleTheme()">DARK</button>
        <div class="user-profile">
            <div class="avatar" th:text="${#strings.substring(client.nume, 0, 1)}">C</div>
            <span th:text="${client.nume} + ' ' + ${client.prenume}" style="font-size: 0.85rem; font-weight: 700;">Client</span>
        </div>
        <a href="/logout" class="btn-logout">Logout</a>
    </div>
</nav>

<div class="sidebar-menu" id="sidebarMenu">
    <div class="menu-section">
        <div class="menu-title">Client Menu</div>
        <div class="menu-item active" onclick="showSection('profile')">My Profile</div>
        <div class="menu-item" onclick="showSection('interventions')">Interventions</div>
        <div class="menu-item" onclick="showSection('schedule')">New Appointment</div>
    </div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="container">
    <div th:if="${errors != null && !errors.isEmpty()}" class="error-box">
        <h4 class="error-title">ATTENTION</h4>
        <ul class="error-list">
            <li class="error-item" th:each="err : ${errors}" th:text="${err}"></li>
        </ul>
    </div>

    <div class="content-section active" id="profileSection">
        <div class="section">
            <h2 style="margin-bottom: 25px; font-weight: 800;">Profile Settings</h2>
            <form th:action="@{/client/update-profile}" method="post">
                <input type="hidden" name="clientId" th:value="${client.id}">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" name="nume" th:value="${client.nume}" required>
                    </div>
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" name="prenume" th:value="${client.prenume}" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" th:value="${client.email}" required readonly>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" name="telefon" th:value="${client.telefon}">
                    </div>
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" name="oras" th:value="${client.oras}">
                    </div>
                    <div class="form-group">
                        <label>County</label>
                        <input type="text" name="judet" th:value="${client.judet}">
                    </div>
                    <div class="form-group">
                        <label>Street</label>
                        <input type="text" name="strada" th:value="${client.strada}">
                    </div>
                    <div class="form-group">
                        <label>Number</label>
                        <input type="text" name="numar" th:value="${client.numar}">
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select name="sex">
                            <option value="" th:selected="${client.sex == null}">Unspecified</option>
                            <option value="M" th:selected="${client.sex == 'M'}">Male</option>
                            <option value="F" th:selected="${client.sex == 'F'}">Female</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-save">Update Profile</button>
            </form>
        </div>
    </div>

    <div class="content-section" id="interventionsSection">
        <div class="section">
            <h2 style="margin-bottom: 25px; font-weight: 800;">My Interventions</h2>
            <div th:if="${interventii != null && !interventii.isEmpty()}">
                <div th:each="int : ${interventii}" style="background: var(--bg-main); padding: 25px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border);">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div>
                            <h4 th:text="${int.adresa ?: 'No Address'}" style="margin-bottom: 5px; font-weight: 700;">Address</h4>
                            <small th:text="${#temporals.format(int.data, 'dd MMMM yyyy, HH:mm')}" style="color: var(--text-muted);"></small>
                        </div>
                        <span style="padding: 6px 15px; border-radius: 10px; background: var(--accent); color: #121212; font-size: 0.7rem; font-weight: 800; text-transform: uppercase;" th:text="${int.status}">Status</span>
                    </div>
                    <p style="margin-top: 15px; font-size: 0.9rem; color: var(--text-muted);" th:text="${int.descriere ?: 'No description provided.'}"></p>

                    <div style="margin-top: 20px; display: flex; gap: 10px;">
                        <a th:if="${int.status == 'Finalizata'}"
                           th:href="@{/client/invoice/{id}(id=${int.id})}"
                           style="background: #4CAF50; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-size: 0.8rem; font-weight: 800;">
                            View Invoice
                        </a>
                        <a th:if="${int.status == 'Programata'}"
                           th:href="@{/client/edit-materials/{id}(id=${int.id})}"
                           style="background: #2196F3; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-size: 0.8rem; font-weight: 800;">
                            Edit Materials
                        </a>
                    </div>
                </div>
            </div>
            <p th:if="${interventii == null || interventii.isEmpty()}" style="color: var(--text-muted); text-align: center;">No interventions found.</p>
        </div>
    </div>

    <div class="content-section" id="scheduleSection">
        <div class="section">
            <h2 style="margin-bottom: 25px; font-weight: 800;">Schedule Intervention</h2>
            <form th:action="@{/client/schedule-intervention}" method="post">
                <input type="hidden" name="clientId" th:value="${client.id}">
                <div class="form-group">
                    <label>Service</label>
                    <select name="serviciuId">
                        <option th:each="s : ${servicii}" th:value="${s.id}" th:text="${s.denumire}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date and Time</label>
                    <input type="datetime-local" name="data" required>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" name="adresa" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" name="descriere">
                </div>
                <button type="submit" class="btn-save">Submit Appointment</button>
            </form>
        </div>
    </div>
</div>

<script>
    function toggleSidebar() {
        document.getElementById('sidebarMenu').classList.toggle('active');
        document.getElementById('sidebarOverlay').classList.toggle('active');
    }

    function showSection(section) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById(section + 'Section').classList.add('active');

        event.currentTarget.classList.add('active');

        if(window.innerWidth < 768) toggleSidebar();
    }

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        body.classList.toggle('dark-mode');
        const isDark = body.classList.contains('dark-mode');
        btn.textContent = isDark ? 'LIGHT' : 'DARK';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    window.onload = () => {
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeBtn').textContent = 'LIGHT';
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Intervention Details - INTERVENTION360</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #FDFBF7;
            --accent: #B8A389;
            --text-dark: #2D2A26;
            --text-muted: #8C8379;
            --border: #E8E2D9;
            --card-bg: #FFFFFF;
            --shadow: 0 4px 20px rgba(184, 163, 137, 0.08);
        }

        body.dark-mode {
            --bg-main: #121212;
            --accent: #D4C3B0;
            --text-dark: #E0E0E0;
            --text-muted: #a0a0a0;
            --border: #333333;
            --card-bg: #1E1E1E;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-main);
            color: var(--text-dark);
            padding: 40px;
            transition: background 0.3s, color 0.3s;
        }

        .header-container {
            max-width: 900px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            box-shadow: var(--shadow);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .info-item {
            padding: 20px;
            background: rgba(184, 163, 137, 0.08);
            border-radius: 16px;
        }

        h1 {
            font-weight: 800;
            font-size: 1.8rem;
        }

        h3 {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 18px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        select {
            background: var(--bg-main);
            color: var(--text-dark);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            outline: none;
            font-family: inherit;
        }

        .btn-update {
            background: var(--accent);
            color: #121212;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-update:hover {
            opacity: 0.9;
        }

        .btn-delete {
            color: #ff5f5f;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .btn-delete:hover {
            text-decoration: underline;
        }

        .theme-toggle {
            background: var(--accent);
            color: #121212;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .btn-back {
            text-decoration: none;
            color: var(--accent);
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="header-container">
    <a href="/dashboard" class="btn-back">← Back</a>
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">DARK</button>
</div>

<div class="container">
    <div class="card">
        <h1>Intervention #<span th:text="${interventie.interventie_id}">1</span></h1>
        <div class="info-grid">
            <div class="info-item">
                <div style="font-size: 0.7rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 800; text-transform: uppercase;">Customer</div>
                <div style="font-weight: 700;" th:text="${interventie.nume} + ' ' + ${interventie.prenume}">Client Name</div>
            </div>
            <div class="info-item">
                <div style="font-size: 0.7rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 800; text-transform: uppercase;">Phone</div>
                <div style="font-weight: 700;" th:text="${interventie.telefon}">Phone Number</div>
            </div>
            <div class="info-item">
                <div style="font-size: 0.7rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 800; text-transform: uppercase;">Service Type</div>
                <div style="font-weight: 700;" th:text="${interventie.denumire}">Service Description</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>Materials Used</h3>
        <table th:if="${!materiale.isEmpty()}">
            <thead>
            <tr>
                <th>Item</th>
                <th>Quantity</th>
                <th>Unit Price</th>
                <th>Subtotal</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="m : ${materiale}">
                <td th:text="${m.denumire}">Material</td>
                <td th:text="${m.cantitate_utilizata} + ' units'">5 units</td>
                <td th:text="${m.pret_achizitie} + ' RON'">10 RON</td>
                <td th:text="${m.subtotal} + ' RON'" style="font-weight: 800; color: var(--accent);">50 RON</td>
            </tr>
            </tbody>
        </table>
        <p th:if="${materiale.isEmpty()}" style="text-align: center; color: var(--text-muted); padding: 20px;">
            No materials associated with this job.
        </p>
    </div>

    <div class="card">
        <h3>Actions</h3>
        <form th:action="@{/update_status}" method="post" style="display: flex; gap: 15px; align-items: center;">
            <input type="hidden" name="idInterventie" th:value="${interventie.interventie_id}">
            <select name="status" style="flex: 1;">
                <option value="Programata" th:selected="${interventie.status == 'Programata'}">Scheduled</option>
                <option value="In desfasurare" th:selected="${interventie.status == 'In desfasurare'}">In Progress</option>
                <option value="Finalizata" th:selected="${interventie.status == 'Finalizata'}">Completed</option>
            </select>
            <button type="submit" class="btn-update">Update Status</button>
        </form>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid var(--border);">

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 0.8rem; color: var(--text-muted);"></span>
            <a th:href="@{/sterge_interventie/{id}(id=${interventie.interventie_id})}"
               class="btn-delete"
               onclick="return confirm('Are you sure you want to permanently delete this record?')">Delete Intervention</a>
        </div>
    </div>
</div>

<script>
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        body.classList.toggle('dark-mode');
        const isDark = body.classList.contains('dark-mode');
        btn.textContent = isDark ? 'LIGHT' : 'DARK';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    window.onload = () => {
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeBtn').textContent = 'LIGHT';
        }
    };
</script>
</body>
</html>
